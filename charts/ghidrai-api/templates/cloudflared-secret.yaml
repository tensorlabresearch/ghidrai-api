{{- if and .Values.cloudflared.enabled .Values.cloudflared.tunnelTokenSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ghidrai-api.tunnelSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghidrai-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.cloudflared.tunnelTokenSecret.key }}: {{ .Values.cloudflared.tunnelTokenSecret.value | quote }}
{{- end }}

