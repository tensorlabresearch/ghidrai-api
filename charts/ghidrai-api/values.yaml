nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/tensorlabresearch/ghidrai-api
  tag: latest
  pullPolicy: Always
  pullSecrets: []

service:
  type: ClusterIP
  port: 8089

app:
  host: 0.0.0.0
  port: 8089
  dataDir: /data
  maxMem: 2G

persistence:
  enabled: true
  existingClaim: ""
  storageClass: local-path
  accessModes:
    - ReadWriteOnce
  size: 20Gi

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 8Gi

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10001

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

nodeSelector: {}
affinity: {}
tolerations: []

cloudflared:
  enabled: true
  image:
    repository: cloudflare/cloudflared
    tag: 2026.2.0
    pullPolicy: IfNotPresent
  tunnelTokenSecret:
    create: false
    existingSecret: ghidrai-api-tunnel-token
    key: token
    value: ""
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

